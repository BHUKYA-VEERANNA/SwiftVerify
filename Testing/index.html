<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Progress Bar</title>
    <link rel="stylesheet" href="style.css">

    <!-- UniIcon CDN Link  -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-ZlZV5IxtuVNH6eHy0bHJql9uXpJdNM6Qw4aOb8r8+/D2m7qhi2fnXr3L/c2I4J44i7plzJiz6C5NW5ksW8O7Xw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
    <div class="main">
<!-- 
        <div class="head">
            <p class="head_1">Animated Step <span>Progress Bar</span></p>
            <p class="head_2">Using Html, Css & JavaScript</p>
        </div> -->

        <ul>
            <li>
                <i class="fas fa-barcode"></i>
                <div class="progress one">
                    <p>1</p>
                    <i class="uil uil-check"></i>
                </div>
                <p class="text">Barcode Detection</p>
            </li>
            <li>
                <i class="icon uil uil-clipboard-notes"></i>
                <div class="progress two">
                    <p>2</p>
                    <i class="uil uil-check"></i>
                </div>
                <p class="text">Face Recognition</p>
            </li>
            <li>
                <i class="icon uil uil-credit-card"></i>
                <div class="progress three">
                    <p>3</p>
                    <i class="uil uil-check"></i>
                </div>
                <p class="text">Voice Match</p>
            </li>
            <!-- <li>
                <i class="icon uil uil-exchange"></i>
                <div class="progress four">

                    <i class="uil uil-check"></i>
                </div>
                <p class="text">Order in Progress</p>
            </li>
            <li>
                <i class="icon uil uil-map-marker"></i>
                <div class="progress five">
                    <p>5</p>
                    <i class="uil uil-check"></i>
                </div>
                <p class="text">Order Arrived</p>
            </li> -->

    </div>

    <script src="main.js"></script>
